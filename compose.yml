services:
  postgres:
    image: postgres:16-alpine
    container_name: cs-stonks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cs_stonks
    ports:
      - "5432:5432"
    volumes:
      - cs_stonks_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cs_stonks"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  cs_stonks_postgres_data:
